<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Tracker — Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --color-background: #09090b;
      --color-surface: #18181b;
      --color-surface-raised: #27272a;
      --color-border: #27272a;
      --color-border-strong: #3f3f46;
      --color-text-primary: #fafafa;
      --color-text-secondary: #d4d4d8;
      --color-text-muted: #a1a1aa;
      --color-accent: #818cf8;
      --color-accent-hover: #6366f1;
      --color-danger: #f87171;
      --color-success: #4ade80;
      --color-warning: #fbbf24;
    }
    [data-theme="gray"] {
      --color-background: #1f1f23;
      --color-surface: #2a2a2f;
      --color-surface-raised: #3f3f46;
      --color-border: #3f3f46;
      --color-border-strong: #52525b;
      --color-text-primary: #f4f4f5;
      --color-text-secondary: #e4e4e7;
      --color-text-muted: #a1a1aa;
      --color-accent: #a5b4fc;
      --color-accent-hover: #818cf8;
      --color-danger: #fca5a5;
      --color-success: #86efac;
      --color-warning: #fde047;
    }
    [data-theme="light"] {
      --color-background: #f4f4f5;
      --color-surface: #ffffff;
      --color-surface-raised: #f4f4f5;
      --color-border: #e4e4e7;
      --color-border-strong: #d4d4d8;
      --color-text-primary: #18181b;
      --color-text-secondary: #3f3f46;
      --color-text-muted: #71717a;
      --color-accent: #4f46e5;
      --color-accent-hover: #4338ca;
      --color-danger: #dc2626;
      --color-success: #16a34a;
      --color-warning: #d97706;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: var(--color-background);
      color: var(--color-text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    a { color: inherit; text-decoration: none; }
    .auth-card {
      width: 100%;
      max-width: 380px;
      background-color: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 12px;
      padding: 32px;
      box-shadow: 0 20px 50px rgba(0,0,0,.25);
    }
    .logo-center {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      font-size: 22px; font-weight: 700; margin-bottom: 24px;
    }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 13px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 6px; }
    .input {
      width: 100%; height: 40px;
      background-color: var(--color-background);
      border: 1px solid var(--color-border-strong);
      border-radius: 8px;
      padding: 0 12px;
      color: var(--color-text-primary);
      font-size: 14px;
    }
    .input::placeholder { color: var(--color-text-muted); }
    .btn {
      width: 100%; height: 40px;
      border-radius: 8px; border: none;
      font-size: 14px; font-weight: 600;
      cursor: pointer;
    }
    .btn-primary { background-color: var(--color-accent); color: #fff; }
    .btn-primary:hover { background-color: var(--color-accent-hover); }
    .btn-secondary { background-color: transparent; color: var(--color-text-secondary); border: 1px solid var(--color-border-strong); margin-top: 10px; }
    .btn-secondary:hover { background-color: var(--color-surface-raised); }
    .theme-toggle {
      position: absolute; top: 16px; right: 16px;
      display: flex; align-items: center; gap: 6px;
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid var(--color-border-strong);
      background: var(--color-surface);
      color: var(--color-text-secondary);
      font-size: 13px;
      cursor: pointer;
    }
    .theme-toggle:hover { color: var(--color-text-primary); }
    .hint { font-size: 12px; color: var(--color-text-muted); margin-top: 16px; text-align: center; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  </style>
</head>
<body>
  <button class="theme-toggle" id="themeBtn"><i data-lucide="moon" style="width:16px;height:16px" id="themeIcon"></i> <span id="themeLabel">Dark</span></button>

  <div class="auth-card">
    <div class="logo-center"><i data-lucide="layers" style="width:28px;height:28px;color:var(--color-accent)"></i> TaskTracker</div>
    <form onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
      <div class="row">
        <div class="field">
          <label>Имя пользователя</label>
          <input class="input" type="text" placeholder="ivan" />
        </div>
        <div class="field">
          <label>Отображаемое имя</label>
          <input class="input" type="text" placeholder="Иван Петров" />
        </div>
      </div>
      <div class="field">
        <label>Email</label>
        <input class="input" type="email" placeholder="ivan@example.com" />
      </div>
      <div class="field">
        <label>Пароль</label>
        <input class="input" type="password" placeholder="минимум 8 символов" />
      </div>
      <div class="field">
        <label>Повтор пароля</label>
        <input class="input" type="password" placeholder="••••••••" />
      </div>
      <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
    </form>
    <a href="login.html" class="btn btn-secondary" style="display:flex">Уже есть аккаунт</a>
    <p class="hint">MVP-демо: регистрация без подтверждения.</p>
  </div>

  <script>
    lucide.createIcons();
    const stored = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', stored);
    function update() {
      const theme = document.documentElement.getAttribute('data-theme');
      const icon = theme === 'dark' ? 'moon' : theme === 'gray' ? 'cloud-sun' : 'sun';
      const label = theme === 'dark' ? 'Dark' : theme === 'gray' ? 'Gray' : 'Light';
      document.getElementById('themeIcon').setAttribute('data-lucide', icon);
      document.getElementById('themeLabel').textContent = label;
      lucide.createIcons();
    }
    update();
    document.getElementById('themeBtn').addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'gray' : current === 'gray' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      update();
    });
  </script>
</body>
</html>
