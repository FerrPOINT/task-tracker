services:
  postgres:
    image: postgres:17.6-alpine
    environment:
      POSTGRES_USER: ${TASKTRACKER_DATABASE_USER:-tasktracker}
      POSTGRES_PASSWORD: ${TASKTRACKER_DATABASE_PASSWORD:-[CHANGE_ME]}
      POSTGRES_DB: ${TASKTRACKER_DATABASE_NAME:-tasktracker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${TASKTRACKER_DATABASE_PORT:-3457}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TASKTRACKER_DATABASE_USER:-tasktracker} -d ${TASKTRACKER_DATABASE_NAME:-tasktracker}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.0-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      TASKTRACKER_DATABASE_URL: ${TASKTRACKER_DATABASE_URL}
      TASKTRACKER_SERVER_ADDRESS: 0.0.0.0
      TASKTRACKER_SERVER_PORT: 3456
      TASKTRACKER_JWT_SECRET: ${TASKTRACKER_JWT_SECRET:-[CHANGE_ME]}
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "3456:3456"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3456/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      NODE_ENV: production
    ports:
      - "19877:80"
    depends_on:
      backend:
        condition: service_healthy

  traefik:
    image: traefik:v3.4
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "8080:80"
      - "8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    profiles:
      - traefik

volumes:
  postgres_data:
  redis_data:
