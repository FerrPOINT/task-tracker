services:
  postgres-test:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: tasktracker
      POSTGRES_PASSWORD: ${TASKTRACKER_TEST_DB_PASSWORD:-[REDACTED]}
      POSTGRES_DB: tasktracker_test
    ports:
      - "127.0.0.1:3458:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasktracker -d tasktracker_test"]
      interval: 1s
      timeout: 5s
      retries: 30

  redis-test:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 5s
      retries: 30
